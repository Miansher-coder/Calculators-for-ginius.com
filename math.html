<!DOCTYPE html>
<html lang="en">
<head>

<title>Mathematics Calculators | Majic of Science</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* ===== ANIMATED SPACE BACKGROUND ===== */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;

background:
radial-gradient(white 1px, transparent 1px),
radial-gradient(cyan 1px, transparent 1px),
radial-gradient(purple 1px, transparent 1px);

background-size:80px 80px,140px 140px,200px 200px;

animation:stars 60s linear infinite;

z-index:-1;
}

@keyframes stars{
from{transform:translateY(0);}
to{transform:translateY(-2000px);}
}

/* ===== NAVBAR ===== */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 60px;

background:linear-gradient(90deg,#0a0f2c,#02044d,#004f6b);
position:sticky;
top:0;
z-index:1000;
}

.logo img{
width:120px;
}

.nav-links{
list-style:none;
display:flex;
gap:35px;
}

.nav-links li a{
text-decoration:none;
color:white;
font-weight:500;
transition:.3s;
padding:8px 18px;
border-radius:20px;
}

.nav-links li a:hover{
background:#00c3ff;
color:black;
}

/* active button */

.active a{
background:linear-gradient(45deg,cyan,blue,purple);
box-shadow:0 0 15px cyan;
}

/* ===== PAGE TITLE ===== */

.main-title{
text-align:center;
margin:40px 0;
font-size:34px;
text-shadow:0 0 20px cyan;
}

/* ===== SLIDER ===== */

.slider{
width:1000px;
max-width:90%;
height:350px;
margin:auto;
overflow:hidden;
border-radius:12px;
border:2px solid cyan;
box-shadow:0 0 25px cyan;
}

.slides{
display:flex;
width:1000px;
animation:slide 16s infinite;
}

.slides img{
width:100%;
height:350px;
object-fit:cover;
}


@keyframes slide{
  0%,20%{transform:translateX(0);}
  25%,40%{transform:translateX(-1000px);}
  50%,60%{transform:translateX(-2000px);}
  75%,80%{transform:translateX(-3000px);}
  100%{transform:translateX(0);}
}

/* ===== SECTION TITLE ===== */

h1{
text-align:center;
margin-top:50px;
font-size:36px;
text-shadow:0 0 20px cyan;
}

/* ===== GRID ===== */

.container{

width:90%;
margin:auto;
margin-top:50px;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

gap:30px;

}

/* ===== CALCULATOR BOX ===== */

.calc{

background:#050520;
height:180px;

border-radius:14px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

cursor:pointer;
transition:.4s;

position:relative;

}

/* neon animated border */

.calc::before{

content:"";
position:absolute;

inset:-3px;

border-radius:16px;

background:linear-gradient(
45deg,
cyan,
blue,
purple,
magenta,
cyan
);

background-size:400%;

animation:borderMove 6s linear infinite;

z-index:-1;

}

@keyframes borderMove{

0%{background-position:0%;}
100%{background-position:400%;}

}

/* icon */

.calc img{

width:70px;
margin-bottom:10px;
transition:.4s;

}

/* text */

.calc span{

font-size:16px;

text-shadow:
0 0 5px cyan,
0 0 10px cyan;

}

/* hover effect */

.calc:hover{

transform:translateY(-10px) scale(1.08);

box-shadow:
0 0 20px cyan,
0 0 40px blue;

}

.calc:hover img{
transform:scale(1.15);
}

</style>
</head>
