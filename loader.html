<!DOCTYPE html>
<html lang="en">
<head>
<!-- ...your existing head content... -->
<style>
/* ...your existing CSS... */

/* ===== LOADER ===== */
.loader-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at top,#0229c3,#11066f,aqua);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.loader {
  text-align: center;
}

.spinner {
  border: 8px solid rgba(255, 255, 255, 0.3);
  border-top: 8px solid #00eaff;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.loader p {
  color: #00eaff;
  font-size: 18px;
  font-weight: bold;
  margin-top: 15px;
}

.loader-hidden {
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.5s ease-out;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader" class="loader-container">
  <div class="loader">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>
</div>

<!-- NAVBAR -->
<!-- ...rest of your content... -->

<script>
  window.addEventListener('load', function() {
    const loader = document.getElementById('loader');
    if (loader) {
      loader.classList.add('loader-hidden');
    }
  });
</script>

</body>
</html>
